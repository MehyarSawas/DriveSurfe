<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DriveSurfe</title>
  <base href="/">
  <!-- CSP via meta tag, NOT a server header: the production host mangles the
       Content-Security-Policy response header (broke styles/fonts). Note
       frame-ancestors is not valid in meta CSP; framing is blocked by the
       X-Frame-Options header in .htaccess instead. -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none'; base-uri 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a73e8">
  <meta name="description" content="Surf your cloud drives — preview and clean up media with swipe gestures">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DriveSurfe">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <ds-root></ds-root>
</body>
</html>
