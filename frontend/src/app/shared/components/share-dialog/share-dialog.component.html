<div class="picker-overlay" (click)="closed.emit()">
  <div class="picker-panel share-panel" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="picker-header">
      <div class="picker-title">{{ isEditing() ? 'Edit share link' : 'Share' }}</div>
      <span class="share-filename" [title]="file().name">{{ file().name }}</span>
      <button class="icon-btn" (click)="closed.emit()" title="Close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="share-body">
      @if (loading()) {
        <div class="picker-loading"><div class="picker-spinner"></div></div>
      } @else {
        @if (existingLink()?.url; as url) {
          <div class="share-link-row">
            <svg class="link-icon" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
            <input class="share-link-input" type="text" readonly [value]="url" (click)="$any($event.target).select()" />
            <button class="copy-btn" (click)="copyLink()">{{ copied() ? 'Copied' : 'Copy' }}</button>
          </div>
        }

        <div class="share-field">
          <label>Who can access</label>
          <select [ngModel]="right()" (ngModelChange)="right.set($event)">
            <option value="public">Anyone with the link</option>
            <option value="password">Anyone with the link + password</option>
            <option value="inherit">Only people on this drive</option>
          </select>
        </div>

        @if (right() === 'password') {
          <div class="share-field">
            <label>Password{{ isEditing() ? ' (leave blank to keep current)' : '' }}</label>
            <input type="text" [ngModel]="password()" (ngModelChange)="password.set($event)"
                   placeholder="Set a password" autocomplete="new-password" />
          </div>
        }

        <div class="share-field">
          <label>Expires (optional)</label>
          <input type="date" [ngModel]="expiryDate()" (ngModelChange)="expiryDate.set($event)" />
        </div>

        <div class="share-toggles">
          <label class="toggle-row">
            <span>Allow download</span>
            <input type="checkbox" [ngModel]="canDownload()" (ngModelChange)="canDownload.set($event)" />
          </label>
          <label class="toggle-row">
            <span>Show file info</span>
            <input type="checkbox" [ngModel]="canSeeInfo()" (ngModelChange)="canSeeInfo.set($event)" />
          </label>
          <label class="toggle-row">
            <span>Allow editing</span>
            <input type="checkbox" [ngModel]="canEdit()" (ngModelChange)="canEdit.set($event)" />
          </label>
          <label class="toggle-row">
            <span>Allow comments</span>
            <input type="checkbox" [ngModel]="canComment()" (ngModelChange)="canComment.set($event)" />
          </label>
        </div>

        @if (error()) {
          <p class="share-error">{{ error() }}</p>
        }

        <div class="share-actions">
          @if (isEditing()) {
            <button class="btn-secondary danger" (click)="stopSharing()" [disabled]="deleting() || saving()">
              {{ deleting() ? 'Removing…' : 'Stop sharing' }}
            </button>
          }
          <button class="btn-primary" (click)="save()" [disabled]="saving() || deleting()">
            {{ saving() ? 'Saving…' : (isEditing() ? 'Update link' : 'Create link') }}
          </button>
        </div>
      }
    </div>
  </div>
</div>
