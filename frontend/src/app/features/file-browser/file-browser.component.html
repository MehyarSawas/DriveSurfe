<div class="browser-layout">
  @if (sidebarOpen()) {
    <div class="sidebar-backdrop" (click)="sidebarOpen.set(false)"></div>
  }

  <aside class="sidebar" [class.closed]="!sidebarOpen()">
    <div class="sidebar-header">
      <div class="app-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="#1a73e8"/>
          <path d="M8 22l4-8 4 6 3-4 5 6H8z" fill="white"/>
        </svg>
        <span>DriveSurfe</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item" (click)="fileService.navigateToFolder('1', 'My Drive')">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        My Drive
      </button>
      <button class="nav-item" (click)="showStarred()">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        Starred
      </button>
      <button class="nav-item" (click)="showTrash()">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Trash
      </button>
    </nav>

    <div class="sidebar-tree">
      @if (fileService.folderTree()) {
        <ds-folder-tree
          [tree]="fileService.folderTree()!"
          [currentFolderId]="fileService.currentFolderId()"
          (folderSelected)="fileService.navigateToFolder($event.id, $event.name)"
        />
      }
    </div>

    <div class="sidebar-footer">
      <button class="nav-item logout" (click)="logout()">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <!-- Toolbar -->
    <header class="toolbar">
      <button class="icon-btn menu-btn" (click)="sidebarOpen.update(v => !v)" title="Toggle sidebar">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>

      <ds-search-bar (search)="onSearch($event)" />

      <div class="toolbar-actions">
        <!-- Filter -->
        <select class="filter-select" [value]="filterType()" (change)="setFilter($any($event.target).value)">
          <option value="">All files</option>
          <option value="image">Images</option>
          <option value="video">Videos</option>
        </select>

        <!-- View toggle -->
        <button class="icon-btn" [class.active]="viewMode() === 'grid'" (click)="viewMode.set('grid')" title="Grid view">
          <svg viewBox="0 0 24 24"><path d="M3 3v8h8V3H3zm6 6H5V5h4v4zm-6 4v8h8v-8H3zm6 6H5v-4h4v4zm4-16v8h8V3h-8zm6 6h-4V5h4v4zm-6 4v8h8v-8h-8zm6 6h-4v-4h4v4z"/></svg>
        </button>
        <button class="icon-btn" [class.active]="viewMode() === 'list'" (click)="viewMode.set('list')" title="List view">
          <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
      </div>
    </header>

    <!-- Breadcrumb -->
    <ds-breadcrumb
      [items]="fileService.breadcrumb()"
      (navigate)="fileService.navigateToFolder($event.id, $event.name)"
    />

    <!-- Sort bar (list view) -->
    @if (viewMode() === 'list') {
      <div class="sort-bar">
        <button class="sort-btn" (click)="toggleSort('name')">
          Name
          @if (sortBy() === 'name') {
            <span>{{ sortDir() === 'asc' ? '↑' : '↓' }}</span>
          }
        </button>
        <button class="sort-btn" (click)="toggleSort('modified_at')">
          Modified
          @if (sortBy() === 'modified_at') {
            <span>{{ sortDir() === 'asc' ? '↑' : '↓' }}</span>
          }
        </button>
        <button class="sort-btn" (click)="toggleSort('size')">
          Size
          @if (sortBy() === 'size') {
            <span>{{ sortDir() === 'asc' ? '↑' : '↓' }}</span>
          }
        </button>
      </div>
    }

    <!-- File content -->
    <div class="file-content">
      @if (fileService.loading()) {
        <div class="loading">
          <div class="spinner"></div>
        </div>
      } @else if (displayFiles().length === 0) {
        <div class="empty">
          <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
          <p>This folder is empty</p>
        </div>
      } @else if (viewMode() === 'grid') {
        <ds-file-grid
          [files]="displayFiles()"
          [selectedIds]="fileService.selectedIds()"
          (fileClick)="openPreview($event)"
          (fileDblClick)="openPreview($event)"
          (favorite)="fileService.toggleFavorite($event)"
          (download)="fileService.downloadFile($event.id, $event.name)"
          (delete)="fileService.delete($event.id)"
        />
      } @else {
        <ds-file-list
          [files]="displayFiles()"
          [selectedIds]="fileService.selectedIds()"
          (fileClick)="openPreview($event)"
          (fileDblClick)="openPreview($event)"
          (favorite)="fileService.toggleFavorite($event)"
          (download)="fileService.downloadFile($event.id, $event.name)"
          (delete)="fileService.delete($event.id)"
        />
      }
    </div>
  </main>
</div>

<!-- Preview overlay -->
@if (previewFile()) {
  <ds-preview
    [file]="previewFile()!"
    [hasPrev]="previewIndex() > 0"
    [hasNext]="previewIndex() < mediaFiles().length - 1"
    (close)="closePreview()"
    (prev)="navigatePreview(-1)"
    (next)="navigatePreview(1)"
    (favorite)="fileService.toggleFavorite($event)"
    (download)="fileService.downloadFile($event.id, $event.name)"
    (delete)="deletePreviewFile($event)"
  />
}
