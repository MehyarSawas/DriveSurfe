<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="loginLogoClip"><rect width="48" height="48" rx="12.75"/></clipPath></defs>
        <rect width="48" height="48" rx="12.75" fill="#0284c7"/>
        <g clip-path="url(#loginLogoClip)">
          <path d="M-3 26.25 C 7.5 18, 16.5 33, 27 24.75 C 36 18, 43.5 27, 51 22.5 L51 51 L-3 51 Z" fill="white" opacity="0.4"/>
          <path d="M-3 33.75 C 7.5 24.75, 16.5 39.75, 27 31.5 C 36 24.75, 43.5 34.5, 51 29.25 L51 51 L-3 51 Z" fill="white"/>
        </g>
      </svg>
    </div>
    <h1>DriveSurfe</h1>
    <p class="subtitle">Surf your cloud drives. Preview &amp; clean up media with swipe gestures.</p>

    <div class="providers">
      @if (loadingPhase()) {
        <div class="loading-indicator">
          <div class="spinner"></div>
          <span>{{ loadingPhase() === 'login' ? 'Complete the biometric prompt…' : 'Registering device…' }}</span>
        </div>
      } @else {
        @if (hasPasskeys()) {
          <button class="passkey-btn primary" (click)="login()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/>
              <path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
              <path d="M15 11l4 4-4 4"/>
            </svg>
            Sign in with passkey
          </button>
          <button class="passkey-btn secondary" (click)="addDevice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
            Add this device
          </button>
        } @else {
          <input
            class="token-input"
            type="password"
            placeholder="Registration token"
            [ngModel]="registrationToken()" (ngModelChange)="registrationToken.set($event)"
            autocomplete="off"
          />
          <button class="passkey-btn primary" (click)="register()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
            Register this device
          </button>
        }
      }

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }
    </div>
  </div>
</div>
