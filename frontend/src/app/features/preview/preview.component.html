<div class="preview-overlay" (click)="close.emit()">

  <!-- Header -->
  <header class="preview-header" (click)="$event.stopPropagation()">
    <button class="icon-btn" (click)="close.emit()" title="Close (Esc)">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <span class="file-title">{{ file().name }}</span>

    <div class="header-actions">
      <button class="icon-btn" [class.starred]="file().is_favorite" (click)="favorite.emit(file())" [title]="file().is_favorite ? 'Remove star' : 'Star'">
        <svg viewBox="0 0 24 24">
          @if (file().is_favorite) {
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          } @else {
            <path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/>
          }
        </svg>
      </button>
      <button class="icon-btn" (click)="download.emit(file())" title="Download">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
      <button class="icon-btn danger" (click)="initiateDelete()" title="Delete">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </header>

  <!-- Media area -->
  <div class="media-area"
    (click)="$event.stopPropagation()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd()"
  >
    <!-- Nav arrows -->
    @if (hasPrev()) {
      <button class="nav-arrow left" (click)="prev.emit()" title="Previous (←)">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
      </button>
    }

    <!-- Media content -->
    <div class="media-container"
      [style.transform]="mediaTransform()"
      [class.transitioning]="isTransitioning()"
    >
      @if (isImage()) {
        <img [src]="previewSrc()" [alt]="file().name" class="media-img" (dblclick)="resetZoom()" />
      } @else if (isVideo()) {
        <video [src]="previewSrc()" controls class="media-video" [style.transform]="'scale(' + zoom() + ')'">
          Your browser does not support video playback.
        </video>
      } @else {
        <div class="no-preview">
          <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <p>No preview available</p>
          <button class="btn-primary" (click)="download.emit(file())">Download</button>
        </div>
      }
    </div>

    @if (hasNext()) {
      <button class="nav-arrow right" (click)="next.emit()" title="Next (→)">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </button>
    }
  </div>

  <!-- Footer -->
  <footer class="preview-footer" (click)="$event.stopPropagation()">
    <div class="swipe-hint">Swipe up to delete · Swipe left/right to navigate</div>
    <div class="zoom-controls">
      <button class="icon-btn" (click)="zoomOut()" title="Zoom out (-)">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7V9z"/></svg>
      </button>
      <span class="zoom-level">{{ (zoom() * 100).toFixed(0) }}%</span>
      <button class="icon-btn" (click)="zoomIn()" title="Zoom in (+)">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zm.5-5H9v2H7v1h2v2h1v-2h2V10h-2V8z"/></svg>
      </button>
    </div>
  </footer>

  <!-- Delete countdown toast -->
  @if (deletePhase() === 'countdown') {
    <div class="delete-toast" (click)="$event.stopPropagation()">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="countdownPercent()"></div>
      </div>
      <div class="toast-row">
        <span class="toast-label">Moving to trash · {{ countdown() }}s</span>
        <button class="btn-undo" (click)="cancelDelete()">Undo</button>
      </div>
    </div>
  }
</div>
