name: Deploy to lima-city

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build

      - name: Install PHP dependencies
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIMA_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.LIMA_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEST: ${{ secrets.LIMA_USER }}@${{ secrets.LIMA_HOST }}:${{ secrets.LIMA_DEPLOY_PATH }}
        run: |
          rsync -az frontend/dist/drivesurfe/browser/ $DEST/backend/public/
          rsync -az backend/public/index.php backend/public/.htaccess $DEST/backend/public/
          rsync -az backend/src/ $DEST/backend/src/
          rsync -az backend/vendor/ $DEST/backend/vendor/
